name: 2 - Build Signed Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64" || (echo "Missing secret: KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing secret: KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing secret: KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing secret: KEY_PASSWORD" && exit 1)

      - name: Restore upload key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/upload-key.jks

      - name: Build signed release AAB
        env:
          KEYSTORE_FILE: keystore/upload-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease --no-daemon

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToxicSearchTool-release-aab
          path: app/build/outputs/bundle/release/*.aab
